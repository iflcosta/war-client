name: Release - macOS, Android

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Versão do release (ex: v1.0.2)'
        required: true
        default: 'v1.0.2'

permissions:
  contents: write

env:
  VCPKG_BINARY_SOURCES: 'clear'

jobs:
  build-macos:
    name: Build macOS (M1)
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install dependencies
        run: brew install ccache ninja

      - name: Download game assets (dat/spr)
        run: |
          gh release download v1.0.0-assets \
            --repo iflcosta/war-client \
            --pattern "860.zip" \
            --output /tmp/860.zip
          mkdir -p data/things/860
          unzip -o /tmp/860.zip "860/Tibia.dat" "860/Tibia.spr" "860/Tibia.otfi" -d /tmp/things_tmp
          cp /tmp/things_tmp/860/* data/things/860/
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Get vcpkg commit ID
        id: vcpkg-step
        run: |
          vcpkgCommitId=$(grep '.builtin-baseline' vcpkg.json | awk -F: '{print $2}' | tr -d '," ')
          echo "vcpkgGitCommitId=$vcpkgCommitId" >> $GITHUB_OUTPUT

      - name: Cache vcpkg
        uses: actions/cache@v4
        with:
          path: ~/.cache/vcpkg
          key: vcpkg-macos-m1-${{ steps.vcpkg-step.outputs.vcpkgGitCommitId }}
          restore-keys: vcpkg-macos-m1-

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: ${{ steps.vcpkg-step.outputs.vcpkgGitCommitId }}

      - name: Get CMake and Ninja
        uses: lukka/get-cmake@v3.29.2

      - name: Configure and Build
        run: |
          cmake -G Ninja -S . -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_TOOLCHAIN_FILE=$VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake \
            -DVCPKG_TARGET_TRIPLET=arm64-osx \
            -DCMAKE_MAKE_PROGRAM=$(which ninja) \
            -DTOGGLE_BIN_FOLDER=ON \
            -DOPTIONS_ENABLE_IPO=OFF \
            -DOPTIONS_ENABLE_CCACHE=ON \
            -DOTCLIENT_BUILD_TESTS=OFF \
            -DX_VCPKG_BINARY_CACHING=OFF
          cmake --build build --target otclient

      - name: Package .app bundle
        run: |
          APP="WorldWar.app"
          MACOS="$APP/Contents/MacOS"
          LIBS="$APP/Contents/libs"
          mkdir -p "$MACOS" "$LIBS"

          cp build/bin/otclient "$MACOS/"

          # Info.plist
          cat > "$APP/Contents/Info.plist" << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0"><dict>
            <key>CFBundleExecutable</key><string>otclient</string>
            <key>CFBundleIdentifier</key><string>com.worldwar.otclient</string>
            <key>CFBundleName</key><string>World War</string>
            <key>CFBundlePackageType</key><string>APPL</string>
            <key>LSMinimumSystemVersion</key><string>11.0</string>
            <key>NSHighResolutionCapable</key><true/>
          </dict></plist>
          EOF

          # Copiar dylibs manualmente
          BINARY="$MACOS/otclient"
          for dylib in $(otool -L "$BINARY" | awk '/\/opt\/homebrew|\/usr\/local/{print $1}'); do
            cp "$dylib" "$LIBS/" 2>/dev/null || true
            install_name_tool -change "$dylib" "@executable_path/../libs/$(basename $dylib)" "$BINARY" 2>/dev/null || true
          done

          # Copiar assets
          cp *.lua "$MACOS/" 2>/dev/null || true
          cp -r data "$MACOS/"
          cp -r modules "$MACOS/"
          cp -r mods "$MACOS/" 2>/dev/null || true
          cp config.ini "$MACOS/" 2>/dev/null || true
          cp cacert.pem "$MACOS/" 2>/dev/null || true

          # Remove arquivos não-binários que impedem codesign --deep
          find "$APP" -name "*.project" -o -name "*.sublime-project" -o -name ".DS_Store" | xargs rm -f 2>/dev/null || true

          # Assina binário e dylibs primeiro, depois o bundle
          codesign --force --sign - "$MACOS/otclient"
          find "$LIBS" -name "*.dylib" -exec codesign --force --sign - {} \; 2>/dev/null || true
          codesign --force --sign - "$APP"

          zip -r worldwar-client-macos.zip "$APP"

      - name: Create macOS Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.version }}-macos
          name: "World War Client ${{ github.event.inputs.version }} - macOS"
          body: |
            ## World War Client ${{ github.event.inputs.version }} — macOS (Apple Silicon M1/M2/M3)

            Servidor: **worldwar.com.br** | Porta: **7171** | Protocolo: **8.60**

            ### Como usar
            Extraia o zip, **clique com botão direito** em `WorldWar.app` → **Abrir** → confirme. Após isso abre normalmente.
          draft: false
          prerelease: false
          files: worldwar-client-macos.zip

  build-android:
    name: Build Android
    runs-on: ubuntu-latest

    env:
      NDK_VERSION: "27.2.12479018"
      ANDROID_API: "24"
      ABI: "arm64-v8a"

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK and CMake
        run: |
          echo "y" | sdkmanager "ndk;${{ env.NDK_VERSION }}" "cmake;3.22.1"

      - name: Download game assets (dat/spr)
        run: |
          gh release download v1.0.0-assets \
            --repo iflcosta/war-client \
            --pattern "860.zip" \
            --output /tmp/860.zip
          mkdir -p data/things/860
          unzip -o /tmp/860.zip "860/Tibia.dat" "860/Tibia.spr" "860/Tibia.otfi" -d /tmp/things_tmp
          cp /tmp/things_tmp/860/* data/things/860/
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Set NDK paths
        run: |
          NDK_PATH=$ANDROID_SDK_ROOT/ndk/${{ env.NDK_VERSION }}
          TOOLCHAIN=$NDK_PATH/toolchains/llvm/prebuilt/linux-x86_64
          echo "NDK_PATH=$NDK_PATH" >> $GITHUB_ENV
          echo "TOOLCHAIN=$TOOLCHAIN" >> $GITHUB_ENV

      - name: Build LuaJIT for Android arm64
        run: |
          git clone --depth=1 https://github.com/LuaJIT/LuaJIT.git /tmp/luajit
          cd /tmp/luajit

          TOOLCHAIN=${{ env.TOOLCHAIN }}
          API=${{ env.ANDROID_API }}
          TARGET_CC="$TOOLCHAIN/bin/aarch64-linux-android${API}-clang"

          make -j$(nproc) \
            HOST_CC="gcc -m64" \
            CROSS="" \
            TARGET_SYS=Linux \
            TARGET_FLAGS="--target=aarch64-linux-android${API} --sysroot=$TOOLCHAIN/sysroot -fPIC" \
            STATIC_CC="$TARGET_CC" \
            DYNAMIC_CC="$TARGET_CC -fPIC" \
            TARGET_LD="$TARGET_CC" \
            TARGET_AR="$TOOLCHAIN/bin/llvm-ar rcus" \
            TARGET_STRIP="$TOOLCHAIN/bin/llvm-strip" \
            BUILDMODE=static

          mkdir -p $GITHUB_WORKSPACE/android/app/libs/lib/arm64-v8a
          mkdir -p $GITHUB_WORKSPACE/android/app/libs/include/luajit
          cp src/libluajit.a $GITHUB_WORKSPACE/android/app/libs/lib/arm64-v8a/
          cp src/libluajit.a $GITHUB_WORKSPACE/android/app/libs/lib/arm64-v8a/liblua.a
          cp src/lua.h src/luaconf.h src/lualib.h src/lauxlib.h src/luajit.h \
            $GITHUB_WORKSPACE/android/app/libs/include/luajit/
          printf 'extern "C" {\n#include "lua.h"\n#include "lualib.h"\n#include "lauxlib.h"\n}\n' > $GITHUB_WORKSPACE/android/app/libs/include/luajit/lua.hpp

      - name: Build OpenAL-Soft for Android arm64
        run: |
          git clone --depth=1 https://github.com/kcat/openal-soft.git /tmp/openal
          cmake -S /tmp/openal -B /tmp/openal-build \
            -DCMAKE_TOOLCHAIN_FILE=${{ env.NDK_PATH }}/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=${{ env.ABI }} \
            -DANDROID_PLATFORM=android-${{ env.ANDROID_API }} \
            -DCMAKE_BUILD_TYPE=Release \
            -DALSOFT_BACKEND_OPENSL=ON \
            -DALSOFT_BACKEND_WAVE=OFF \
            -DALSOFT_UTILS=OFF \
            -DALSOFT_EXAMPLES=OFF \
            -DALSOFT_TESTS=OFF \
            -DBUILD_SHARED_LIBS=OFF \
            -DLIBTYPE=STATIC
          cmake --build /tmp/openal-build -j$(nproc)
          find /tmp/openal-build -name "libopenal.a" -o -name "libOpenAL.a" | head -1 | \
            xargs -I{} cp {} $GITHUB_WORKSPACE/android/app/libs/lib/arm64-v8a/libopenal.a

      - name: Build Minizip for Android arm64
        run: |
          git clone --depth=1 https://github.com/zlib-ng/minizip-ng.git /tmp/minizip
          cmake -S /tmp/minizip -B /tmp/minizip-build \
            -DCMAKE_TOOLCHAIN_FILE=${{ env.NDK_PATH }}/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=${{ env.ABI }} \
            -DANDROID_PLATFORM=android-${{ env.ANDROID_API }} \
            -DCMAKE_BUILD_TYPE=Release \
            -DMZ_BUILD_TESTS=OFF \
            -DMZ_BUILD_UNIT_TESTS=OFF \
            -DMZ_COMPAT=ON \
            -DBUILD_SHARED_LIBS=OFF
          cmake --build /tmp/minizip-build -j$(nproc)
          find /tmp/minizip-build -name "libminizip*.a" | head -1 | \
            xargs -I{} cp {} $GITHUB_WORKSPACE/android/app/libs/lib/arm64-v8a/libminizip.a
          mkdir -p $GITHUB_WORKSPACE/android/app/libs/include/minizip
          cp /tmp/minizip/mz.h /tmp/minizip/mz_compat.h /tmp/minizip/unzip.h /tmp/minizip/zip.h \
            $GITHUB_WORKSPACE/android/app/libs/include/minizip/ 2>/dev/null || true
          cp /tmp/minizip/compat/ioapi.h /tmp/minizip/compat/ioapi_mem.h \
            $GITHUB_WORKSPACE/android/app/libs/include/minizip/ 2>/dev/null || true

      - name: Setup vcpkg
        run: |
          vcpkgCommitId=$(grep '.builtin-baseline' vcpkg.json | awk -F: '{print $2}' | tr -d '," ')
          git clone https://github.com/microsoft/vcpkg.git vcpkg
          git -C vcpkg checkout "$vcpkgCommitId"
          ./vcpkg/bootstrap-vcpkg.sh -disableMetrics
          echo "VCPKG_ROOT=$GITHUB_WORKSPACE/vcpkg" >> $GITHUB_ENV

      - name: Build APK via Gradle
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon \
            -Pandroid.ndkVersion=${{ env.NDK_VERSION }}
        env:
          ANDROID_SDK_ROOT: ${{ env.ANDROID_SDK_ROOT }}
          ANDROID_NDK_HOME: ${{ env.NDK_PATH }}
          VCPKG_ROOT: ${{ env.VCPKG_ROOT }}
          VCPKG_DEFAULT_HOST_TRIPLET: x64-linux

      - name: Locate and rename APK
        run: |
          APK=$(find android -name "*.apk" | grep -v "unaligned" | head -1)
          echo "Found APK: $APK"
          cp "$APK" worldwar-client-android.apk

      - name: Create Android Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.version }}-android
          name: "World War Client ${{ github.event.inputs.version }} - Android"
          body: |
            ## World War Client ${{ github.event.inputs.version }} — Android

            Servidor: **worldwar.com.br** | Porta: **7171** | Protocolo: **8.60**

            ### Como usar
            Baixe e instale o APK. Pode ser necessário habilitar **"Instalar apps desconhecidos"** nas configurações.
          draft: false
          prerelease: false
          files: worldwar-client-android.apk
