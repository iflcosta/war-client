name: Release - macOS, Android

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Versão do release (ex: v1.0.0)'
        required: true
        default: 'v1.0.0'

permissions:
  contents: write

env:
  VCPKG_BINARY_SOURCES: 'clear'

jobs:
  build-macos:
    name: Build macOS (M1)
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install dependencies
        run: brew install ccache ninja dylibbundler

      - name: Download game assets (dat/spr)
        run: |
          gh release download v1.0.0-assets \
            --repo iflcosta/war-client \
            --pattern "860.zip" \
            --output /tmp/860.zip
          mkdir -p data/things/860
          unzip -o /tmp/860.zip "860/Tibia.dat" "860/Tibia.spr" "860/Tibia.otfi" -d /tmp/things_tmp
          cp /tmp/things_tmp/860/* data/things/860/
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Get vcpkg commit ID
        id: vcpkg-step
        run: |
          vcpkgCommitId=$(grep '.builtin-baseline' vcpkg.json | awk -F: '{print $2}' | tr -d '," ')
          echo "vcpkgGitCommitId=$vcpkgCommitId" >> $GITHUB_OUTPUT

      - name: Cache vcpkg
        uses: actions/cache@v4
        with:
          path: ~/.cache/vcpkg
          key: vcpkg-macos-m1-${{ steps.vcpkg-step.outputs.vcpkgGitCommitId }}
          restore-keys: vcpkg-macos-m1-

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: ${{ steps.vcpkg-step.outputs.vcpkgGitCommitId }}

      - name: Get CMake and Ninja
        uses: lukka/get-cmake@v3.29.2

      - name: Configure and Build
        run: |
          cmake -G Ninja -S . -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_TOOLCHAIN_FILE=$VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake \
            -DVCPKG_TARGET_TRIPLET=arm64-osx \
            -DCMAKE_MAKE_PROGRAM=$(which ninja) \
            -DTOGGLE_BIN_FOLDER=ON \
            -DOPTIONS_ENABLE_IPO=OFF \
            -DOPTIONS_ENABLE_CCACHE=ON \
            -DOTCLIENT_BUILD_TESTS=OFF \
            -DX_VCPKG_BINARY_CACHING=OFF
          cmake --build build --target otclient

      - name: Package .app bundle
        run: |
          mkdir -p "WorldWar.app/Contents/MacOS"
          mkdir -p "WorldWar.app/Contents/Resources"
          mkdir -p "WorldWar.app/Contents/libs"

          cp build/bin/otclient "WorldWar.app/Contents/MacOS/"

          cat <<EOF > "WorldWar.app/Contents/Info.plist"
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleExecutable</key>
              <string>otclient</string>
              <key>CFBundleIdentifier</key>
              <string>com.worldwar.otclient</string>
              <key>CFBundleName</key>
              <string>World War</string>
              <key>CFBundlePackageType</key>
              <string>APPL</string>
              <key>CFBundleVersion</key>
              <string>${{ github.event.inputs.version }}</string>
              <key>CFBundleShortVersionString</key>
              <string>${{ github.event.inputs.version }}</string>
              <key>LSMinimumSystemVersion</key>
              <string>11.0</string>
              <key>NSHighResolutionCapable</key>
              <true/>
          </dict>
          </plist>
          EOF

          dylibbundler -od -b \
            -x "WorldWar.app/Contents/MacOS/otclient" \
            -d "WorldWar.app/Contents/libs/" \
            -p "@executable_path/../libs/"

          cp *.lua "WorldWar.app/Contents/MacOS/" 2>/dev/null || true
          cp -r data "WorldWar.app/Contents/MacOS/"
          cp -r modules "WorldWar.app/Contents/MacOS/"
          cp -r mods "WorldWar.app/Contents/MacOS/" 2>/dev/null || true
          cp config.ini "WorldWar.app/Contents/MacOS/" 2>/dev/null || true
          cp cacert.pem "WorldWar.app/Contents/MacOS/" 2>/dev/null || true

          codesign --deep --force --sign - WorldWar.app

          zip -r worldwar-client-macos.zip WorldWar.app

      - name: Create macOS Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.version }}-macos
          name: "World War Client ${{ github.event.inputs.version }} - macOS"
          body: |
            ## World War Client ${{ github.event.inputs.version }} — macOS (Apple Silicon M1/M2/M3)

            Servidor: **worldwar.com.br** | Porta: **7171** | Protocolo: **8.60**

            ### Como usar
            Extraia o zip, clique com botão direito em `WorldWar.app` → **Abrir**. O servidor já vem configurado.
          draft: false
          prerelease: false
          files: worldwar-client-macos.zip

  build-android:
    name: Build Android
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK, CMake and Game Activity
        run: |
          echo "y" | sdkmanager "cmake;3.22.1"
          echo "y" | sdkmanager "games;game-activity:2.0.2"
          NDK_VER=$(ls $ANDROID_SDK_ROOT/ndk/ | sort -V | tail -1)
          echo "NDK_VERSION=$NDK_VER" >> $GITHUB_ENV

      - name: Download game assets (dat/spr)
        run: |
          gh release download v1.0.0-assets \
            --repo iflcosta/war-client \
            --pattern "860.zip" \
            --output /tmp/860.zip
          mkdir -p data/things/860
          unzip -o /tmp/860.zip "860/Tibia.dat" "860/Tibia.spr" "860/Tibia.otfi" -d /tmp/things_tmp
          cp /tmp/things_tmp/860/* data/things/860/
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Get vcpkg commit ID
        id: vcpkg-step
        run: |
          vcpkgCommitId=$(grep '.builtin-baseline' vcpkg.json | awk -F: '{print $2}' | tr -d '," ')
          echo "vcpkgGitCommitId=$vcpkgCommitId" >> $GITHUB_OUTPUT

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: ${{ steps.vcpkg-step.outputs.vcpkgGitCommitId }}

      - name: Build native libs (arm64-v8a)
        run: |
          NDK_PATH=$ANDROID_SDK_ROOT/ndk/$NDK_VERSION
          GAME_ACTIVITY_DIR=$ANDROID_SDK_ROOT/games/game-activity/2.0.2
          cmake -S . -B build-android \
            -DCMAKE_TOOLCHAIN_FILE=$VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake \
            -DVCPKG_CHAINLOAD_TOOLCHAIN_FILE=$NDK_PATH/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-24 \
            -DCMAKE_BUILD_TYPE=Release \
            -DVCPKG_TARGET_ANDROID=ON \
            -DOTCLIENT_BUILD_TESTS=OFF \
            -Dgame-activity_DIR=$GAME_ACTIVITY_DIR/cmake
          cmake --build build-android --target otclient -j$(nproc)

      - name: Copy .so to Android libs folder
        run: |
          mkdir -p android/app/libs/lib/arm64-v8a
          find build-android -name "libotclient.so" -exec cp {} android/app/libs/lib/arm64-v8a/ \;

      - name: Bundle data.zip for Android assets
        run: |
          ASSETS_DIR=android/app/src/main/assets
          rm -f $ASSETS_DIR/data.zip
          zip -r $ASSETS_DIR/data.zip \
            data/ modules/ mods/ init.lua otclientrc.lua config.ini cacert.pem \
            --exclude "data/things/*" 2>/dev/null || true
          zip -r $ASSETS_DIR/data.zip data/things/860/

      - name: Build APK
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon

      - name: Locate APK
        run: |
          APK=$(find android -name "*.apk" | head -1)
          cp "$APK" worldwar-client-android.apk

      - name: Create Android Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.version }}-android
          name: "World War Client ${{ github.event.inputs.version }} - Android"
          body: |
            ## World War Client ${{ github.event.inputs.version }} — Android

            Servidor: **worldwar.com.br** | Porta: **7171** | Protocolo: **8.60**

            ### Como usar
            Baixe e instale o APK. Pode ser necessário habilitar "Fontes desconhecidas" nas configurações do Android.
          draft: false
          prerelease: false
          files: worldwar-client-android.apk
