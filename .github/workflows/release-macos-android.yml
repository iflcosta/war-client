name: Release - macOS, Android

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Versão do release (ex: v1.0.0)'
        required: true
        default: 'v1.0.0'

permissions:
  contents: write

env:
  VCPKG_BINARY_SOURCES: 'clear'

jobs:
  build-macos:
    name: Build macOS (M1)
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install dependencies
        run: brew install ccache ninja dylibbundler

      - name: Download game assets (dat/spr)
        run: |
          gh release download v1.0.0-assets \
            --repo iflcosta/war-client \
            --pattern "860.zip" \
            --output /tmp/860.zip
          mkdir -p data/things/860
          unzip -o /tmp/860.zip "860/Tibia.dat" "860/Tibia.spr" "860/Tibia.otfi" -d /tmp/things_tmp
          cp /tmp/things_tmp/860/* data/things/860/
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Get vcpkg commit ID
        id: vcpkg-step
        run: |
          vcpkgCommitId=$(grep '.builtin-baseline' vcpkg.json | awk -F: '{print $2}' | tr -d '," ')
          echo "vcpkgGitCommitId=$vcpkgCommitId" >> $GITHUB_OUTPUT

      - name: Cache vcpkg
        uses: actions/cache@v4
        with:
          path: ~/.cache/vcpkg
          key: vcpkg-macos-m1-${{ steps.vcpkg-step.outputs.vcpkgGitCommitId }}
          restore-keys: vcpkg-macos-m1-

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: ${{ steps.vcpkg-step.outputs.vcpkgGitCommitId }}

      - name: Get CMake and Ninja
        uses: lukka/get-cmake@v3.29.2

      - name: Configure and Build
        run: |
          cmake -G Ninja -S . -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_TOOLCHAIN_FILE=$VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake \
            -DVCPKG_TARGET_TRIPLET=arm64-osx \
            -DCMAKE_MAKE_PROGRAM=$(which ninja) \
            -DTOGGLE_BIN_FOLDER=ON \
            -DOPTIONS_ENABLE_IPO=OFF \
            -DOPTIONS_ENABLE_CCACHE=ON \
            -DOTCLIENT_BUILD_TESTS=OFF \
            -DX_VCPKG_BINARY_CACHING=OFF
          cmake --build build --target otclient

      - name: Package .app bundle
        run: |
          APP="WorldWar.app"
          MACOS="$APP/Contents/MacOS"
          LIBS="$APP/Contents/libs"
          mkdir -p "$MACOS" "$LIBS" "$APP/Contents"

          # Entitlements JIT — necessário para LuaJIT rodar no Apple Silicon
          printf '%s' '<?xml version="1.0" encoding="UTF-8"?><!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd"><plist version="1.0"><dict><key>com.apple.security.cs.allow-jit</key><true/><key>com.apple.security.cs.allow-unsigned-executable-memory</key><true/><key>com.apple.security.cs.disable-library-validation</key><true/></dict></plist>' > /tmp/entitlements.plist

          # Assina o binário ANTES de montar o bundle (evita "unsealed contents" error)
          codesign --force --sign - --entitlements /tmp/entitlements.plist build/bin/otclient
          cp build/bin/otclient "$MACOS/"

          # Info.plist
          VER="${{ github.event.inputs.version }}"
          printf '<?xml version="1.0" encoding="UTF-8"?><!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd"><plist version="1.0"><dict><key>CFBundleExecutable</key><string>otclient</string><key>CFBundleIdentifier</key><string>com.worldwar.otclient</string><key>CFBundleName</key><string>World War</string><key>CFBundlePackageType</key><string>APPL</string><key>CFBundleVersion</key><string>%s</string><key>CFBundleShortVersionString</key><string>%s</string><key>LSMinimumSystemVersion</key><string>11.0</string><key>NSHighResolutionCapable</key><true/></dict></plist>' "$VER" "$VER" > "$APP/Contents/Info.plist"

          # Copia dylibs e ajusta rpath
          for dylib in $(otool -L "$MACOS/otclient" | awk '/\/opt\/homebrew|\/usr\/local/{print $1}'); do
            cp "$dylib" "$LIBS/" 2>/dev/null || true
            install_name_tool -change "$dylib" "@executable_path/../libs/$(basename $dylib)" "$MACOS/otclient" 2>/dev/null || true
          done

          # Assina dylibs
          find "$LIBS" -name "*.dylib" -exec codesign --force --sign - {} \; 2>/dev/null || true

          # Copia assets
          cp *.lua "$MACOS/" 2>/dev/null || true
          cp -r data "$MACOS/"
          cp -r modules "$MACOS/"
          cp -r mods "$MACOS/" 2>/dev/null || true
          cp config.ini "$MACOS/" 2>/dev/null || true
          cp cacert.pem "$MACOS/" 2>/dev/null || true

          zip -r worldwar-client-macos.zip "$APP"

      - name: Create macOS Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.version }}-macos
          name: "World War Client ${{ github.event.inputs.version }} - macOS"
          body: |
            ## World War Client ${{ github.event.inputs.version }} — macOS (Apple Silicon M1/M2/M3)

            Servidor: **worldwar.com.br** | Porta: **7171** | Protocolo: **8.60**

            ### Como usar
            1. Extraia o zip
            2. **Clique direito** em `WorldWar.app` → **Abrir** → confirme no popup
            3. Na próxima vez abre normalmente com duplo clique

            > Se aparecer "aplicativo danificado", abra o Terminal e execute:
            > `xattr -dr com.apple.quarantine WorldWar.app`
          draft: false
          prerelease: false
          files: worldwar-client-macos.zip

  build-android:
    name: Build Android
    runs-on: ubuntu-22.04

    env:
      NDK_VERSION: "27.2.12479018"
      ANDROID_API: "24"

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK and CMake
        run: |
          echo "y" | sdkmanager "ndk;${{ env.NDK_VERSION }}" "cmake;3.22.1"
          echo "NDK_PATH=$ANDROID_SDK_ROOT/ndk/${{ env.NDK_VERSION }}" >> $GITHUB_ENV
          echo "TOOLCHAIN=$ANDROID_SDK_ROOT/ndk/${{ env.NDK_VERSION }}/toolchains/llvm/prebuilt/linux-x86_64" >> $GITHUB_ENV

      - name: Download game assets (dat/spr)
        run: |
          gh release download v1.0.0-assets \
            --repo iflcosta/war-client \
            --pattern "860.zip" \
            --output /tmp/860.zip
          mkdir -p data/things/860
          unzip -o /tmp/860.zip "860/Tibia.dat" "860/Tibia.spr" "860/Tibia.otfi" -d /tmp/things_tmp
          cp /tmp/things_tmp/860/* data/things/860/
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build LuaJIT for Android arm64
        run: |
          git clone --depth=1 https://github.com/LuaJIT/LuaJIT.git /tmp/luajit
          cd /tmp/luajit
          API=${{ env.ANDROID_API }}
          TARGET_CC="${{ env.TOOLCHAIN }}/bin/aarch64-linux-android${API}-clang"
          make -j$(nproc) \
            HOST_CC="gcc -m64" \
            CROSS="" \
            TARGET_SYS=Linux \
            TARGET_FLAGS="--target=aarch64-linux-android${API} --sysroot=${{ env.TOOLCHAIN }}/sysroot -fPIC" \
            STATIC_CC="$TARGET_CC" \
            DYNAMIC_CC="$TARGET_CC -fPIC" \
            TARGET_LD="$TARGET_CC" \
            TARGET_AR="${{ env.TOOLCHAIN }}/bin/llvm-ar rcus" \
            TARGET_STRIP="${{ env.TOOLCHAIN }}/bin/llvm-strip" \
            BUILDMODE=static
          LIBS_DIR=$GITHUB_WORKSPACE/android/app/libs
          mkdir -p "$LIBS_DIR/lib/arm64-v8a" "$LIBS_DIR/include/luajit"
          cp src/libluajit.a "$LIBS_DIR/lib/arm64-v8a/libluajit.a"
          cp src/libluajit.a "$LIBS_DIR/lib/arm64-v8a/liblua.a"
          cp src/lua.h src/luaconf.h src/lualib.h src/lauxlib.h src/luajit.h "$LIBS_DIR/include/luajit/"
          printf 'extern "C" {\n#include "lua.h"\n#include "lualib.h"\n#include "lauxlib.h"\n}\n' \
            > "$LIBS_DIR/include/luajit/lua.hpp"

      - name: Build OpenAL-Soft for Android arm64
        run: |
          git clone --depth=1 https://github.com/kcat/openal-soft.git /tmp/openal
          cmake -S /tmp/openal -B /tmp/openal-build \
            -DCMAKE_TOOLCHAIN_FILE=${{ env.NDK_PATH }}/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-${{ env.ANDROID_API }} \
            -DCMAKE_BUILD_TYPE=Release \
            -DALSOFT_BACKEND_OPENSL=ON \
            -DALSOFT_BACKEND_WAVE=OFF \
            -DALSOFT_UTILS=OFF \
            -DALSOFT_EXAMPLES=OFF \
            -DALSOFT_TESTS=OFF \
            -DBUILD_SHARED_LIBS=OFF \
            -DLIBTYPE=STATIC
          cmake --build /tmp/openal-build -j$(nproc)
          find /tmp/openal-build -name "libopenal.a" -o -name "libOpenAL.a" | head -1 | \
            xargs -I{} cp {} $GITHUB_WORKSPACE/android/app/libs/lib/arm64-v8a/libopenal.a

      - name: Build Minizip for Android arm64
        run: |
          git clone --depth=1 https://github.com/zlib-ng/minizip-ng.git /tmp/minizip
          cmake -S /tmp/minizip -B /tmp/minizip-build \
            -DCMAKE_TOOLCHAIN_FILE=${{ env.NDK_PATH }}/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-${{ env.ANDROID_API }} \
            -DCMAKE_BUILD_TYPE=Release \
            -DMZ_BUILD_TESTS=OFF \
            -DMZ_BUILD_UNIT_TESTS=OFF \
            -DMZ_COMPAT=ON \
            -DMZ_LZMA=OFF \
            -DMZ_BZIP2=OFF \
            -DMZ_PKCRYPT=ON \
            -DMZ_WZAES=ON \
            -DBUILD_SHARED_LIBS=OFF
          cmake --build /tmp/minizip-build -j$(nproc)
          find /tmp/minizip-build -name "libminizip*.a" | head -1 | \
            xargs -I{} cp {} $GITHUB_WORKSPACE/android/app/libs/lib/arm64-v8a/libminizip.a
          MZIP_INC=$GITHUB_WORKSPACE/android/app/libs/include/minizip
          mkdir -p "$MZIP_INC"
          find /tmp/minizip -maxdepth 2 -name "*.h" -exec cp {} "$MZIP_INC/" \; 2>/dev/null || true
          # ioapi_mem.h não existe no minizip-ng — criar manualmente
          echo '' | \
            base64 -d > "$MZIP_INC/ioapi_mem.h"

      - name: Patch build.gradle.kts for arm64-only + LuaJIT include
        working-directory: android
        run: |
          echo '' | base64 -d > /tmp/patch_gradle.py
          python3 /tmp/patch_gradle.py

      - name: Setup vcpkg
        id: vcpkg-step
        run: |
          vcpkgCommitId=$(grep '.builtin-baseline' vcpkg.json | awk -F: '{print $2}' | tr -d '," ')
          git clone https://github.com/microsoft/vcpkg.git /tmp/vcpkg
          git -C /tmp/vcpkg checkout "$vcpkgCommitId"
          /tmp/vcpkg/bootstrap-vcpkg.sh -disableMetrics
          echo "VCPKG_ROOT=/tmp/vcpkg" >> $GITHUB_ENV

      - name: Patch vcpkg triplet to disable LZMA/PPMD in minizip-ng
        run: |
          TRIPLET_FILE="/tmp/vcpkg/triplets/community/arm64-android.cmake"
          echo 'set(VCPKG_BUILD_TYPE release)' >> "$TRIPLET_FILE"
          echo 'list(APPEND VCPKG_CMAKE_CONFIGURE_OPTIONS "-DMZ_LZMA=OFF" "-DMZ_BZIP2=OFF" "-DMZ_ZSTD=OFF")' >> "$TRIPLET_FILE"

      - name: Bundle data.zip for Android assets
        run: |
          ASSETS_DIR=android/app/src/main/assets
          mkdir -p "$ASSETS_DIR"
          rm -f "$ASSETS_DIR/data.zip"
          zip -r "$ASSETS_DIR/data.zip" \
            data/ modules/ mods/ init.lua otclientrc.lua config.ini cacert.pem \
            --exclude "data/things/*" 2>/dev/null || true
          zip -r "$ASSETS_DIR/data.zip" data/things/860/

      - name: Build APK (debug — instalável sem keystore)
        working-directory: android
        env:
          ANDROID_NDK_HOME: ${{ env.NDK_PATH }}
          VCPKG_ROOT: /tmp/vcpkg
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Locate APK
        run: |
          APK=$(find android -name "*debug*.apk" | head -1)
          echo "APK found: $APK"
          cp "$APK" worldwar-client-android.apk

      - name: Create Android Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.version }}-android
          name: "World War Client ${{ github.event.inputs.version }} - Android"
          body: |
            ## World War Client ${{ github.event.inputs.version }} — Android (arm64)

            Servidor: **worldwar.com.br** | Porta: **7171** | Protocolo: **8.60**

            ### Como instalar
            1. Baixe o APK
            2. No Android: **Configurações → Segurança → Fontes desconhecidas** (habilitar)
            3. Abra o arquivo APK baixado e instale
          draft: false
          prerelease: false
          files: worldwar-client-android.apk
