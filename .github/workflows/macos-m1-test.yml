name: Build - MacOS M1 (SDL2)

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write
  actions: write

env:
  VCPKG_BINARY_SOURCES: 'clear'

jobs:
  build:
    name: MacOS M1 Build (SDL2)
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install MacOS Dependencies
        run: |
          brew install ccache ninja

      - name: Get vcpkg commit ID
        id: vcpkg-step
        run: |
          vcpkgCommitId=$(grep '.builtin-baseline' vcpkg.json | awk -F: '{print $2}' | tr -d '," ')
          echo "vcpkgGitCommitId=$vcpkgCommitId" >> $GITHUB_OUTPUT

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: ${{ steps.vcpkg-step.outputs.vcpkgGitCommitId }}

      - name: Install CMake and Ninja
        uses: lukka/get-cmake@v3.29.2

      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          key: macos-m1-ccache-${{ github.sha }}
          restore-keys: |
            macos-m1-ccache-

      - name: Configure and Build
        run: |
          cmake -G Ninja -S . -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_TOOLCHAIN_FILE=$VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake \
            -DVCPKG_TARGET_TRIPLET=arm64-osx \
            -DCMAKE_MAKE_PROGRAM=$(which ninja) \
            -DTOGGLE_BIN_FOLDER=ON \
            -DOPTIONS_ENABLE_IPO=OFF \
            -DOPTIONS_ENABLE_CCACHE=ON \
            -DX_VCPKG_BINARY_CACHING=OFF

          cmake --build build --target otclient

      - name: Package .app Bundle
        run: |
          brew install dylibbundler
          
          # Create bundle structure
          mkdir -p "AethriumWar.app/Contents/MacOS"
          mkdir -p "AethriumWar.app/Contents/Resources"
          mkdir -p "AethriumWar.app/Contents/libs"
          
          # Copy binary
          cp build/bin/otclient "AethriumWar.app/Contents/MacOS/"
          
          # Create Info.plist
          cat <<EOF > "AethriumWar.app/Contents/Info.plist"
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleExecutable</key>
              <string>otclient</string>
              <key>CFBundleIdentifier</key>
              <string>com.aethrium.otclient</string>
              <key>CFBundleName</key>
              <string>Aethrium War</string>
              <key>CFBundlePackageType</key>
              <string>APPL</string>
              <key>CFBundleVersion</key>
              <string>1.0</string>
              <key>CFBundleShortVersionString</key>
              <string>1.0</string>
              <key>LSMinimumSystemVersion</key>
              <string>11.0</string>
              <key>NSHighResolutionCapable</key>
              <true/>
          </dict>
          </plist>
          EOF
          
          # Fix library dependencies FIRST (before adding non-binary resources)
          dylibbundler -od -b -x "AethriumWar.app/Contents/MacOS/otclient" -d "AethriumWar.app/Contents/libs/" -p "@executable_path/../libs/"
          
          # Copy game data to Resources (Safe place)
          cp -r data "AethriumWar.app/Contents/Resources/"
          cp -r modules "AethriumWar.app/Contents/Resources/"
          [ -d mods ] && cp -r mods "AethriumWar.app/Contents/Resources/"
          
          # Create symlinks in MacOS so the engine finds them
          cd "AethriumWar.app/Contents/MacOS"
          ln -s ../Resources/data data
          ln -s ../Resources/modules modules
          [ -d ../Resources/mods ] && ln -s ../Resources/mods mods
          cd ../../..
          
          # Create a ZIP of the bundle
          zip -r AethriumWar_MacOS_M1.zip AethriumWar.app

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: otclient-macos-m1-app
          path: AethriumWar_MacOS_M1.zip
